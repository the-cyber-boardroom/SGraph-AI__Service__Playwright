<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SG Playwright — Admin Dashboard</title>
  <link rel="stylesheet" href="https://dev.tools.sgraph.ai/components/tokens/v1/v1.0/v1.0.0/sg-tokens.css">
  <link rel="stylesheet" href="admin.css">
</head>
<body>

  <sp-cli-top-bar page-title="Admin Dashboard" region="eu-west-2">
    <sp-cli-vault-picker slot="vault-picker"></sp-cli-vault-picker>
  </sp-cli-top-bar>

  <!-- vault gate: shown until vault connects -->
  <div id="vault-gate" class="vault-gate">
    <div class="vault-gate-card">
      <div class="vault-gate-title">Connect a vault to use this console</div>
      <div class="vault-gate-hint">Click <strong>Connect vault</strong> in the top bar →</div>
    </div>
  </div>

  <!-- main content: hidden until vault connects -->
  <main id="main-content" hidden>
    <!-- PR-3: sg-layout with Stacks / Catalog / Activity Log + Vault Activity -->
    <div class="temp-vault-activity">
      <sp-cli-vault-activity></sp-cli-vault-activity>
    </div>
  </main>

  <script type="module" src="../components/sp-cli/sp-cli-top-bar/v0/v0.1/v0.1.0/sp-cli-top-bar.js"></script>
  <script type="module" src="../components/sp-cli/sp-cli-vault-picker/v0/v0.1/v0.1.0/sp-cli-vault-picker.js"></script>
  <script type="module" src="../components/sp-cli/sp-cli-vault-activity/v0/v0.1/v0.1.0/sp-cli-vault-activity.js"></script>
  <script type="module" src="admin.js"></script>

</body>
</html>
