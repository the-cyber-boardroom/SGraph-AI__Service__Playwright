<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SG Playwright — Admin</title>
  <link rel="stylesheet" href="../shared/tokens.css">
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <sg-api-client></sg-api-client>
  <sg-auth-panel></sg-auth-panel>
  <sg-header title="Admin Dashboard"></sg-header>
  <sg-toast-host></sg-toast-host>
  <main>
    <section id="type-cards-section">
      <h2>Stack Types</h2>
      <sg-stack-grid id="type-grid" mode="type-cards"></sg-stack-grid>
    </section>
    <section id="active-stacks-section">
      <h2>Active Stacks</h2>
      <sg-stack-grid id="active-grid" mode="admin-table"></sg-stack-grid>
    </section>
  </main>
  <script type="module" src="../shared/components/sg-api-client.js"></script>
  <script type="module" src="../shared/components/sg-auth-panel.js"></script>
  <script type="module" src="../shared/components/sg-header.js"></script>
  <script type="module" src="../shared/components/sg-toast-host.js"></script>
  <script type="module" src="../shared/components/sg-stack-card.js"></script>
  <script type="module" src="../shared/components/sg-stack-grid.js"></script>
  <script type="module" src="admin.js"></script>
</body>
</html>
