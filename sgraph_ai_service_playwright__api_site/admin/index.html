<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SG/Compute — Admin</title>
  <link rel="stylesheet" href="https://dev.tools.sgraph.ai/components/tokens/v1/v1.0/v1.0.0/sg-tokens.css">
  <link rel="stylesheet" href="../shared/ec2-tokens.css">
  <link rel="stylesheet" href="admin.css">
</head>
<body>

  <sg-compute-top-bar page-title="Admin Dashboard">
    <sg-compute-region-picker slot="region-picker" value="eu-west-2"></sg-compute-region-picker>
    <sg-compute-vault-picker  slot="vault-picker"></sg-compute-vault-picker>
  </sg-compute-top-bar>

  <main id="main-content">
    <sg-layout id="root-layout"></sg-layout>
    <sg-compute-diagnostics-view id="diag-col" hidden></sg-compute-diagnostics-view>
  </main>

  <sg-auth-panel></sg-auth-panel>

  <!-- infrastructure -->
  <script type="module" src="../components/sp-cli/sg-compute-top-bar/v0/v0.1/v0.1.0/sg-compute-top-bar.js"></script>
  <script type="module" src="../components/sp-cli/sg-compute-region-picker/v0/v0.1/v0.1.0/sg-compute-region-picker.js"></script>
  <script type="module" src="../components/sp-cli/sg-compute-vault-picker/v0/v0.1/v0.1.0/sg-compute-vault-picker.js"></script>
  <script type="module" src="../shared/components/sg-auth-panel.js"></script>

  <!-- plugin cards — spec_id drives which card renders; catalogue is the source of truth.
       Specs migrated via FV2.6 are loaded from /api/specs/<id>/ui/ (StaticFiles mount).
       Remaining specs still use the dashboard-relative path until their FV2.6 session.
       If a script tag exists for a spec NOT in the catalogue, no card will render for it.
       If the catalogue lists a spec with no script tag, that spec is silently skipped. -->
  <!-- all specs migrated FV2.6 — loaded from StaticFiles mount at /api/specs/<id>/ui/ -->
  <script type="module" src="/api/specs/docker/ui/card/v0/v0.1/v0.1.0/sg-compute-docker-card.js"></script>
  <script type="module" src="/api/specs/podman/ui/card/v0/v0.1/v0.1.0/sg-compute-podman-card.js"></script>
  <script type="module" src="/api/specs/elastic/ui/card/v0/v0.1/v0.1.0/sg-compute-elastic-card.js"></script>
  <script type="module" src="/api/specs/vnc/ui/card/v0/v0.1/v0.1.0/sg-compute-vnc-card.js"></script>
  <script type="module" src="/api/specs/prometheus/ui/card/v0/v0.1/v0.1.0/sg-compute-prometheus-card.js"></script>
  <script type="module" src="/api/specs/opensearch/ui/card/v0/v0.1/v0.1.0/sg-compute-opensearch-card.js"></script>
  <script type="module" src="/api/specs/neko/ui/card/v0/v0.1/v0.1.0/sg-compute-neko-card.js"></script>
  <script type="module" src="/api/specs/firefox/ui/card/v0/v0.1/v0.1.0/sg-compute-firefox-card.js"></script>

  <!-- per-spec detail panels — all migrated FV2.6 -->
  <script type="module" src="/api/specs/docker/ui/detail/v0/v0.1/v0.1.0/sg-compute-docker-detail.js"></script>
  <script type="module" src="/api/specs/podman/ui/detail/v0/v0.1/v0.1.0/sg-compute-podman-detail.js"></script>
  <script type="module" src="/api/specs/elastic/ui/detail/v0/v0.1/v0.1.0/sg-compute-elastic-detail.js"></script>
  <script type="module" src="/api/specs/vnc/ui/detail/v0/v0.1/v0.1.0/sg-compute-vnc-detail.js"></script>
  <script type="module" src="/api/specs/prometheus/ui/detail/v0/v0.1/v0.1.0/sg-compute-prometheus-detail.js"></script>
  <script type="module" src="/api/specs/opensearch/ui/detail/v0/v0.1/v0.1.0/sg-compute-opensearch-detail.js"></script>
  <script type="module" src="/api/specs/neko/ui/detail/v0/v0.1/v0.1.0/sg-compute-neko-detail.js"></script>
  <script type="module" src="/api/specs/firefox/ui/detail/v0/v0.1/v0.1.0/sg-compute-firefox-detail.js"></script>

  <!-- host control plane widgets -->
  <script type="module" src="../components/sp-cli/_shared/sg-compute-host-shell/v0/v0.1/v0.1.0/sg-compute-host-shell.js"></script>
  <script type="module" src="../components/sp-cli/_shared/sg-compute-host-api-panel/v0/v0.1/v0.1.0/sg-compute-host-api-panel.js"></script>

  <!-- launcher pane + launch panel -->
  <script type="module" src="../components/sp-cli/_shared/sg-compute-launch-form/v0/v0.1/v0.1.0/sg-compute-launch-form.js"></script>
  <script type="module" src="../components/sp-cli/sg-compute-launcher-pane/v0/v0.1/v0.1.0/sg-compute-launcher-pane.js"></script>
  <script type="module" src="../components/sp-cli/sg-compute-launch-panel/v0/v0.1/v0.1.0/sg-compute-launch-panel.js"></script>

  <!-- left nav + view shells -->
  <script type="module" src="../components/sp-cli/sg-compute-left-nav/v0/v0.1/v0.1.0/sg-compute-left-nav.js"></script>
  <script type="module" src="../components/sp-cli/sg-compute-compute-view/v0/v0.1/v0.1.0/sg-compute-compute-view.js"></script>
  <script type="module" src="../components/sp-cli/sg-compute-nodes-view/v0/v0.1/v0.1.0/sg-compute-nodes-view.js"></script>
  <script type="module" src="../components/sp-cli/sg-compute-specs-view/v0/v0.1/v0.1.0/sg-compute-specs-view.js"></script>
  <script type="module" src="../components/sp-cli/sg-compute-stacks-view/v0/v0.1/v0.1.0/sg-compute-stacks-view.js"></script>
  <script type="module" src="../components/sp-cli/sg-compute-storage-view/v0/v0.1/v0.1.0/sg-compute-storage-view.js"></script>
  <script type="module" src="../components/sp-cli/sg-compute-settings-view/v0/v0.1/v0.1.0/sg-compute-settings-view.js"></script>
  <script type="module" src="../components/sp-cli/sg-compute-diagnostics-view/v0/v0.1/v0.1.0/sg-compute-diagnostics-view.js"></script>
  <script type="module" src="../components/sp-cli/sg-compute-api-view/v0/v0.1/v0.1.0/sg-compute-api-view.js"></script>

  <!-- diagnostics panel components (used inside sg-compute-diagnostics-view nested layout) -->
  <script type="module" src="../components/sp-cli/sg-compute-events-log/v0/v0.1/v0.1.0/sg-compute-events-log.js"></script>
  <script type="module" src="../components/sp-cli/sg-compute-vault-status/v0/v0.1/v0.1.0/sg-compute-vault-status.js"></script>
  <script type="module" src="../components/sp-cli/sg-compute-active-sessions/v0/v0.1/v0.1.0/sg-compute-active-sessions.js"></script>
  <script type="module" src="../components/sp-cli/sg-compute-cost-tracker/v0/v0.1/v0.1.0/sg-compute-cost-tracker.js"></script>
  <script type="module" src="../components/sp-cli/sg-compute-storage-viewer/v0/v0.1/v0.1.0/sg-compute-storage-viewer.js"></script>

  <script type="module" src="admin.js"></script>

</body>
</html>
