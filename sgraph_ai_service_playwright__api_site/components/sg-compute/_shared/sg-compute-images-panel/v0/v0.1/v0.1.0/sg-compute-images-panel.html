<div class="ip-banner no-key-banner" hidden></div>

<div class="ip-toolbar">
  <span class="img-status"></span>
  <button class="ec2-btn btn-refresh">↺ Refresh</button>
</div>

<div class="img-list"></div>

<div class="s3-section">
  <div class="s3-title">Load image from S3</div>
  <div class="s3-form">
    <input class="s3-bucket ec2-input" type="text" placeholder="bucket-name" aria-label="S3 bucket">
    <input class="s3-key ec2-input"    type="text" placeholder="path/to/image.tar" aria-label="S3 key">
    <button class="ec2-btn btn-s3-load">Load</button>
  </div>
  <div class="s3-status"></div>
</div>
