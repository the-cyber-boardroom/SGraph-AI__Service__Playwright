<div class="stacks-pane">
  <div class="pane-header">
    <span class="pane-title">Active Stacks</span>
    <span class="stack-count"></span>
    <button class="btn-refresh" title="Refresh">↺</button>
  </div>
  <div class="stack-list" hidden></div>
  <div class="empty-state">
    <div class="empty-icon">⬡</div>
    <div class="empty-msg">No active stacks</div>
    <div class="empty-hint">Launch a stack from the Catalog tab.</div>
  </div>
</div>
