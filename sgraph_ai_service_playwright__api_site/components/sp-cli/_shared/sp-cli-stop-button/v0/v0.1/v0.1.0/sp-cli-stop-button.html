<div class="stop-idle">
  <button class="btn-stop" title="Stop this node">
    <span class="btn-icon">⏹</span>
    <span class="btn-label">Stop Node</span>
  </button>
</div>
<div class="confirm-wrap" hidden>
  <div class="confirm-card">
    <span class="confirm-icon">⚠</span>
    <span class="confirm-msg">Stop <strong class="confirm-name"></strong>?</span>
    <div class="confirm-actions">
      <button class="btn-cancel">Cancel</button>
      <button class="btn-confirm">Confirm Stop</button>
    </div>
  </div>
</div>
