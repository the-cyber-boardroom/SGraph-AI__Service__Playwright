<div class="launch-form">
  <div class="form-group">
    <label class="form-label">Stack name <span class="form-hint">(auto-generated — edit to override)</span></label>
    <input type="text" class="field-name form-input" placeholder="e.g. podman-nova-4217">
  </div>
  <div class="form-group">
    <label class="form-label">Region</label>
    <select class="field-region form-select"></select>
  </div>
  <div class="form-group">
    <label class="form-label">Instance type</label>
    <select class="field-instance form-select"></select>
  </div>
  <div class="form-group">
    <label class="form-label">Auto-stop after</label>
    <select class="field-hours form-select"></select>
  </div>
  <div class="adv-section">
    <button type="button" class="adv-toggle">▶ Advanced</button>
    <div class="adv-body" hidden>
      <div class="adv-hint">Advanced options coming in a future release.</div>
    </div>
  </div>
</div>
