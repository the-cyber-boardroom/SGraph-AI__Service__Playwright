<div class="launch-form">
  <div class="form-group">
    <label class="form-label">Node name <span class="form-hint">(auto-generated — edit to override)</span></label>
    <input type="text" class="field-name form-input" placeholder="e.g. podman-nova-4217">
  </div>
  <div class="form-group">
    <label class="form-label">Region</label>
    <select class="field-region form-select"></select>
  </div>
  <div class="form-group">
    <label class="form-label">Instance type</label>
    <select class="field-instance form-select"></select>
  </div>
  <div class="form-group">
    <label class="form-label">Auto-stop after</label>
    <select class="field-hours form-select"></select>
  </div>
  <div class="adv-section">
    <button type="button" class="adv-toggle">▶ Advanced</button>
    <div class="adv-body" hidden>
      <div class="ip-info">
        <div class="ip-row">
          <span class="ip-label">Your browser IP:</span>
          <span class="field-browser-ip ip-value">detecting…</span>
        </div>
        <div class="ip-note">
          When launching via the Lambda API, AWS uses the Lambda's outbound IP — not your browser IP — for security-group rules.
          Enable <strong>Open access</strong> below to allow connections from any IP.
        </div>
      </div>
      <label class="open-row">
        <input type="checkbox" class="field-open">
        <span class="open-label">Open access (0.0.0.0/0) — required when launching via the API</span>
      </label>
    </div>
  </div>
</div>
