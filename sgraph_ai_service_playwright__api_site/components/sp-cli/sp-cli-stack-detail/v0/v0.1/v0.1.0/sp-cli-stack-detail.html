<div class="pane-empty">
  <div class="empty-icon">📋</div>
  <div class="empty-msg">Select a stack to view details</div>
</div>

<div class="pane-detail" hidden>

  <div class="pane-header">
    <div class="header-left">
      <span class="type-badge"></span>
      <span class="stack-name"></span>
    </div>
    <div class="header-right">
      <span class="state-badge"></span>
      <span class="uptime"></span>
    </div>
  </div>

  <div class="detail-grid">
    <div class="detail-row">
      <span class="detail-key">Region</span>
      <span class="detail-val" data-field="region">—</span>
    </div>
    <div class="detail-row">
      <span class="detail-key">Public IP</span>
      <span class="detail-val" data-field="public_ip">—</span>
    </div>
    <div class="detail-row">
      <span class="detail-key">Instance ID</span>
      <span class="detail-val mono" data-field="instance_id">—</span>
    </div>
    <div class="detail-row">
      <span class="detail-key">Instance type</span>
      <span class="detail-val" data-field="instance_type">—</span>
    </div>
    <div class="detail-row">
      <span class="detail-key">Launched</span>
      <span class="detail-val" data-field="launch_time">—</span>
    </div>
    <div class="detail-row">
      <span class="detail-key">Allowed IP</span>
      <span class="detail-val mono" data-field="allowed_ip">—</span>
    </div>
  </div>

  <div class="vnc-actions" hidden>
    <button class="btn-open-viewer">Open Viewer ↗</button>
  </div>

  <div class="actions">
    <div class="confirm-row" hidden>
      <span class="confirm-msg">Delete this stack?</span>
      <button class="btn-confirm-delete">Yes, delete</button>
      <button class="btn-cancel-delete">Cancel</button>
    </div>
    <button class="btn-delete" hidden>Delete stack</button>
  </div>

  <div class="loading-overlay" hidden>
    <span class="loading-spinner">⟳</span>
    <span class="loading-msg">Working…</span>
  </div>

</div>
