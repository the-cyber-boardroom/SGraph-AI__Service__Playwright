<div class="backdrop" hidden>
  <div class="modal" role="dialog" aria-modal="true">

    <div class="modal-header">
      <div class="modal-header-text">
        <span class="modal-title">Launch stack</span>
        <div class="modal-desc"></div>
      </div>
      <button class="btn-close" aria-label="Close">✕</button>
    </div>

    <hr class="modal-divider">

    <form class="modal-form">

      <label class="field">
        <span class="field-label">Stack name <span class="field-hint">(leave blank to auto-generate)</span></span>
        <input class="field-input" name="stack_name" type="text" autocomplete="off" spellcheck="false" placeholder="auto-generated">
      </label>

      <label class="field">
        <span class="field-label">Instance type</span>
        <select class="field-select" name="instance_type">
          <option value="t3.small">t3.small  — 2 vCPU / 2 GB</option>
          <option value="t3.medium" selected>t3.medium — 2 vCPU / 4 GB</option>
          <option value="t3.large">t3.large  — 2 vCPU / 8 GB</option>
          <option value="t3.xlarge">t3.xlarge — 4 vCPU / 16 GB</option>
        </select>
      </label>

      <label class="field">
        <span class="field-label">Max hours <span class="field-hint">(auto-terminate)</span></span>
        <select class="field-select" name="max_hours">
          <option value="1" selected>1 hour</option>
          <option value="2">2 hours</option>
          <option value="4">4 hours</option>
          <option value="8">8 hours</option>
          <option value="24">24 hours</option>
        </select>
      </label>

      <div class="error-msg" hidden></div>

      <div class="modal-actions">
        <button type="button" class="btn-cancel">Cancel</button>
        <button type="submit" class="btn-launch">
          <span class="btn-label">Launch</span>
          <span class="btn-spinner" hidden>⟳</span>
        </button>
      </div>

    </form>

  </div>
</div>
