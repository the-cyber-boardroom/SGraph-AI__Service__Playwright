<div class="vault-status">
  <div class="status-row">
    <span class="status-dot dot-disconnected"></span>
    <span class="status-text">Disconnected</span>
  </div>
  <div class="detail-row">
    <span class="detail-key">Vault</span>
    <span class="detail-val vault-id">—</span>
  </div>
  <div class="detail-row">
    <span class="detail-key">Endpoint</span>
    <span class="detail-val vault-endpoint">—</span>
  </div>
  <div class="detail-row">
    <span class="detail-key">Mode</span>
    <span class="detail-val vault-mode">—</span>
  </div>
  <button class="btn-browse" hidden>Browse →</button>
</div>
