<div class="diag-view">

  <div class="diag-tabs">
    <button class="diag-tab active" data-tab="events">Events Log</button>
    <button class="diag-tab" data-tab="health">Health</button>
  </div>

  <div class="diag-panel" data-panel="events">
    <sp-cli-events-log></sp-cli-events-log>
  </div>

  <div class="diag-panel" data-panel="health" hidden>
    <div class="health-body">
      <div class="health-title">System Health</div>
      <div class="health-row">
        <span class="health-key">API URL</span>
        <span class="health-val api-url">—</span>
      </div>
      <div class="health-hint">
        More health checks (latency, session pool, vault connectivity) coming in a follow-up brief.
      </div>
    </div>
  </div>

</div>
