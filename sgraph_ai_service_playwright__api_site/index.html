<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SG Playwright — EC2 Launcher</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>SG Playwright <span class="badge">EC2 Launcher</span></h1>
  <p class="subtitle">Configure access to a running Playwright + agent_mitmproxy EC2 instance.</p>
  <nav style="margin-top:1rem; display:flex; gap:.6rem; flex-wrap:wrap;">
    <a href="admin/" style="padding:.3rem .75rem; border-radius:6px; border:1px solid #2a2d3a; background:#22253a; color:#8ab4f8; text-decoration:none; font-size:.85rem; transition:background .15s;" onmouseover="this.style.background='#2a2d4a'" onmouseout="this.style.background='#22253a'">Admin Dashboard</a>
    <a href="user/"  style="padding:.3rem .75rem; border-radius:6px; border:1px solid #2a2d3a; background:#22253a; color:#8ab4f8; text-decoration:none; font-size:.85rem; transition:background .15s;" onmouseover="this.style.background='#2a2d4a'" onmouseout="this.style.background='#22253a'">Provision a Stack</a>
  </nav>
</header>

<main>

  <section class="card" id="config-card">
    <h2>Connection</h2>
    <div class="field-row">
      <label for="ip">IP / Host</label>
      <input id="ip" type="text" placeholder="18.132.60.220" spellcheck="false">
    </div>
    <div class="field-row field-row--inline">
      <div>
        <label for="port">Port</label>
        <input id="port" type="number" value="8000" min="1" max="65535">
      </div>
      <div class="grow">
        <label for="key-name">Key header</label>
        <input id="key-name" type="text" value="X-API-Key" spellcheck="false">
      </div>
    </div>
    <div class="field-row">
      <label for="key-value">API key value</label>
      <div class="input-row">
        <input id="key-value" type="password" placeholder="paste key here" spellcheck="false" autocomplete="off">
        <button class="icon-btn" id="toggle-key" title="Show / hide">&#128065;</button>
      </div>
    </div>
    <div class="action-row">
      <button id="btn-save"   class="btn btn--primary">Save</button>
      <button id="btn-health" class="btn">Check health</button>
      <button id="btn-cookie" class="btn btn--accent">Set auth cookie</button>
    </div>
    <p id="save-msg" class="msg" aria-live="polite"></p>
  </section>

  <section class="card" id="health-card" hidden>
    <h2>Health <span id="health-badge" class="badge"></span></h2>
    <pre id="health-output"></pre>
  </section>

  <section class="card" id="links-card" hidden>
    <h2>Quick links</h2>
    <ul id="links-list"></ul>
  </section>

</main>

<script src="storage.js"></script>
<script src="cookie.js"></script>
<script src="health.js"></script>
<script src="app.js"></script>
</body>
</html>
