# ═══════════════════════════════════════════════════════════════════════════════
# LiteLLM config — Anthropic-compatible proxy in front of host Ollama
#
# Claude Code speaks the Anthropic Messages API (POST /v1/messages). Ollama's
# /v1 is an OpenAI shim only (POST /v1/chat/completions). LiteLLM bridges them:
# it serves /v1/messages and forwards to Ollama's native /api/chat (selected by
# the `ollama_chat/` provider prefix, which is more reliable than `ollama/`).
#
# Models below mirror what the user has pulled on the host. Switch inside
# Claude Code with `/model <model_name>` — no config edit needed.
# ═══════════════════════════════════════════════════════════════════════════════

model_list:
  - model_name: qwen2.5-coder:7b
    litellm_params:
      model: ollama_chat/qwen2.5-coder:7b
      api_base: http://host.docker.internal:11434

  - model_name: llama3.1:8b
    litellm_params:
      model: ollama_chat/llama3.1:8b
      api_base: http://host.docker.internal:11434

  - model_name: gemma4:e2b
    litellm_params:
      model: ollama_chat/gemma4:e2b
      api_base: http://host.docker.internal:11434

  - model_name: gemma4:e4b
    litellm_params:
      model: ollama_chat/gemma4:e4b
      api_base: http://host.docker.internal:11434

  - model_name: gemma4:31b
    litellm_params:
      model: ollama_chat/gemma4:31b
      api_base: http://host.docker.internal:11434

  - model_name: deepseek-r1:32b
    litellm_params:
      model: ollama_chat/deepseek-r1:32b
      api_base: http://host.docker.internal:11434

  - model_name: qwen3:30b
    litellm_params:
      model: ollama_chat/qwen3:30b
      api_base: http://host.docker.internal:11434

litellm_settings:
  # drop Anthropic-only params (e.g. cache_control, anthropic-beta hints)
  # that LiteLLM cannot forward to Ollama, instead of 400-ing.
  drop_params: true
