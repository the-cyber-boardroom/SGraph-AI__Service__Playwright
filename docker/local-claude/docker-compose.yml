# ═══════════════════════════════════════════════════════════════════════════════
# SG Playwright — docker/local-claude/docker-compose.yml
#
# Laptop-local twin of `sg lc` (EC2 local-claude). Runs Claude Code CLI in a
# container that talks to a LiteLLM sidecar, which translates the Anthropic
# Messages API into Ollama's /api/chat:
#
#   Claude Code ──Anthropic /v1/messages──▶ LiteLLM ──/api/chat──▶ host Ollama
#
# Prereqs (on the host Mac):
#   - `ollama serve` running with OLLAMA_HOST=0.0.0.0:11434
#     (one-shot: `launchctl setenv OLLAMA_HOST 0.0.0.0:11434` + restart Ollama.app)
#   - target model already pulled (e.g. `ollama pull qwen2.5-coder:7b`)
#
# Usage (from the repo root):
#   docker compose -f docker/local-claude/docker-compose.yml build
#   docker compose -f docker/local-claude/docker-compose.yml run --rm local-claude
#
# Compose volume paths are resolved relative to THIS file, so `../../` is the
# repo root regardless of the shell's working directory.
# ═══════════════════════════════════════════════════════════════════════════════

services:

  # ── Anthropic → Ollama translation proxy ───────────────────────────────────
  litellm:
    # main-stable is fine for local dev; pin to a dated tag later if needed.
    image: ghcr.io/berriai/litellm:main-stable
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./litellm.config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000", "--host", "0.0.0.0"]
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:4000/health/liveliness', timeout=2).status == 200 else sys.exit(1)"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s

  # ── Claude Code CLI ────────────────────────────────────────────────────────
  local-claude:
    build:
      context: .
    image: sg-playwright/local-claude:latest
    depends_on:
      litellm:
        condition: service_healthy
    # host-gateway keeps host.docker.internal resolvable on non-Docker-Desktop
    # runtimes too (Linux); Docker Desktop on Mac already resolves it natively.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    mem_limit: 6g
    environment:
      # No /v1 suffix — the Anthropic SDK appends /v1/messages itself.
      OLLAMA_MODEL:        ${OLLAMA_MODEL:-qwen2.5-coder:7b}
      ANTHROPIC_BASE_URL:  ${ANTHROPIC_BASE_URL:-http://litellm:4000}
    volumes:
      # ../../ resolves to the repo root because compose resolves paths relative
      # to this file. Workspace mount lets Claude edit the project files.
      - ../../:/workspace
    working_dir: /workspace
    stdin_open: true
    tty: true
