# ═══════════════════════════════════════════════════════════════════════════════
# Build + Push sg-playwright image to Docker Hub
#
# Triggers on changes to the playwright spec or the sg_compute SDK (both are
# baked into the image). Pushes two tags per build:
#   diniscruz/sg-playwright:<version>   — immutable, version-pinned
#   diniscruz/sg-playwright:latest      — floating, for compose / quick pulls
#
# Version is read from sg_compute_specs/playwright/core/version.
#
# Multi-arch: linux/amd64 + linux/arm64 — matches diniscruz/sg-send-vault.
#
# Required secret: DOCKERHUB_TOKEN  (Docker Hub personal access token for
#   diniscruz; set in GitHub repository secrets).
#
# Manual trigger (workflow_dispatch) always rebuilds regardless of path filter.
# ═══════════════════════════════════════════════════════════════════════════════

name: Build + Push sg-playwright image

on:
  push:
    branches: [dev, main]
    paths:
      - 'sg_compute_specs/playwright/Dockerfile'
      - 'sg_compute_specs/playwright/requirements.txt'
      - 'sg_compute_specs/playwright/core/**'
      - 'sg_compute/**'
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild (always true for manual runs)'
        type: boolean
        default: true

env:
  DOCKERHUB_USERNAME : 'diniscruz'
  IMAGE_NAME         : 'sg-playwright'

permissions:
  contents: read

jobs:

  # ════════════════════════════════════════════════════════════════════════════
  # Job 1: Detect image-relevant changes (skips rebuild on push when no
  #   playwright/sg_compute files changed; manual dispatch always rebuilds).
  # ════════════════════════════════════════════════════════════════════════════
  detect-changes:
    name: Detect Image-Relevant Changes
    runs-on: ubuntu-latest
    outputs:
      rebuild-needed: ${{ steps.filter.outputs.rebuild }}
    steps:
      - uses: actions/checkout@v5

      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            rebuild:
              - 'sg_compute_specs/playwright/Dockerfile'
              - 'sg_compute_specs/playwright/requirements.txt'
              - 'sg_compute_specs/playwright/core/**'
              - 'sg_compute/**'

  # ════════════════════════════════════════════════════════════════════════════
  # Job 2: Build multi-arch image and push to Docker Hub
  # ════════════════════════════════════════════════════════════════════════════
  build-and-push:
    name: Build + Push to Docker Hub
    needs: detect-changes
    if: needs.detect-changes.outputs.rebuild-needed == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Read image version
        id: version
        run: echo "version=$(cat sg_compute_specs/playwright/core/version)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build + push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context     : .
          file        : sg_compute_specs/playwright/Dockerfile
          platforms   : linux/amd64,linux/arm64
          push        : true
          tags        : |
            ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
          cache-from  : type=gha
          cache-to    : type=gha,mode=max
