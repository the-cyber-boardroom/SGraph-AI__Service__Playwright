name: CI Pipeline (Base)

# ═══════════════════════════════════════════════════════════════════════════════
# Reusable base pipeline — called by ci-pipeline__{dev,main,prod}.yml.
#
# Jobs:
#   1. run-unit-tests              — pytest tests/ci + tests/unit (always)
#   2. check-aws-credentials       — gate for the host-image job
#   3. detect-changes              — path filter: playwright-image / host-image
#   4. increment-tag               — version bump (dev/main only)
#   5. build-and-push-playwright-image
#                                  — multi-arch image → Docker Hub
#                                    (diniscruz/sg-playwright). Path-gated on
#                                    sg_compute_specs/playwright/** + sg_compute/**.
#   6. build-and-push-host-image   — host control image → ECR (separate concern)
#
# The Playwright Lambda / ECR / S3-zip jobs were retired in v0.2.11 — the
# service now ships as a Docker Hub image only. See
# team/roles/architect/reviews/05/14/v0.2.6__playwright-deployment-simplification.md
# ═══════════════════════════════════════════════════════════════════════════════

on:
  workflow_call:
    inputs:
      git_branch:
        required: true
        type: string
      release_type:
        required: false
        type: string
        default: ""
      should_increment_tag:
        required: false
        type: boolean
        default: false
      target_deploy:
        required: true
        type: string
      force_image_rebuild:
        required: false
        type: boolean
        default: false                                                                  # Set true to rebuild + push the image even when no image-relevant files changed (base-image refresh, cache bust)
    secrets:
      DOCKERHUB_TOKEN:
        required: false                                                                 # Docker Hub PAT for the diniscruz namespace — needed to push the playwright image
      AWS_SECRET_ACCESS_KEY:
        required: false
      AWS_DEFAULT_REGION:
        required: false
      AWS_ACCOUNT_ID:
        required: false
      AWS_ACCESS_KEY_ID:
        required: false

env:
  DOCKERHUB_USERNAME : 'diniscruz'
  IMAGE_NAME         : 'sg-playwright'
  REGISTRY_IMAGE     : 'diniscruz/sg-playwright'

permissions:
  contents: write
  id-token: write

jobs:

  # ════════════════════════════════════════════════════════════════════════════
  # Job 1: Unit Tests (no browser, no Docker)
  # ════════════════════════════════════════════════════════════════════════════
  run-unit-tests:
    name: "Run Unit Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-timeout build
          pip install -e .

      - name: Run CI guards
        timeout-minutes: 2
        run: python -m pytest tests/ci/ -v --timeout=30

      - name: Run unit tests
        timeout-minutes: 5
        run: python -m pytest tests/unit/ -v --timeout=30

  # ════════════════════════════════════════════════════════════════════════════
  # Job 2: Check AWS Credentials (gate for the host-control-image job only —
  #   the Playwright image goes to Docker Hub and needs no AWS creds).
  # ════════════════════════════════════════════════════════════════════════════
  check-aws-credentials:
    name: Check AWS Credentials
    runs-on: ubuntu-latest
    outputs:
      has-credentials: ${{ steps.check.outputs.has-credentials }}
    steps:
      - name: Check if AWS credentials are configured
        id: check
        run: |
          if [[ -n "${{ secrets.AWS_ACCESS_KEY_ID }}" ]] && \
             [[ -n "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ]] && \
             [[ -n "${{ secrets.AWS_DEFAULT_REGION }}" ]] && \
             [[ -n "${{ secrets.AWS_ACCOUNT_ID }}" ]]; then
            echo "has-credentials=true" >> $GITHUB_OUTPUT
          else
            echo "has-credentials=false" >> $GITHUB_OUTPUT
            echo "AWS credentials not configured — host-control image push skipped"
          fi

  # ════════════════════════════════════════════════════════════════════════════
  # Job 3: Detect Image-Relevant Changes (path filter — skip image rebuilds
  #   when no image-relevant file changed).
  #
  #   playwright-image : anything baked into diniscruz/sg-playwright —
  #                      the playwright spec + the sg_compute SDK it imports.
  #   host-image       : the separate host-control ECR image.
  #
  #   Each build job is gated with `if:` on its filter output (plus the
  #   force_image_rebuild dispatch input) — this is how a single workflow
  #   path-gates an individual job.
  # ════════════════════════════════════════════════════════════════════════════
  detect-changes:
    name: Detect Image-Relevant Changes
    runs-on: ubuntu-latest
    outputs:
      playwright-image-needed : ${{ steps.filter.outputs.playwright-image }}
      host-image-needed       : ${{ steps.filter.outputs.host-image       }}
    steps:
      - uses: actions/checkout@v5

      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            playwright-image:
              - 'sg_compute_specs/playwright/**'
              - 'sg_compute/**'
            host-image:
              - 'sg_compute/**'
              - 'docker/host-control/**'

  # ════════════════════════════════════════════════════════════════════════════
  # Job 4: Increment Tag (dev bumps minor, main bumps major; skipped on prod).
  #   Runs before the image build so the pushed image is tagged with the
  #   freshly-bumped version.
  # ════════════════════════════════════════════════════════════════════════════
  increment-tag:
    name: Increment Tag
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [run-unit-tests]
    if: ${{ inputs.should_increment_tag }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Increment Tag
        uses: owasp-sbot/OSBot-GitHub-Actions/.github/actions/git__increment-tag@dev
        with:
          release_type: ${{ inputs.release_type }}

      - name: Sync sg_compute version
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          git pull --rebase
          NEW_VERSION=$(cat sg_compute_specs/playwright/core/version)
          echo "$NEW_VERSION" > sg_compute/version
          sed -i "s/^version = \"[^\"]*\"/version = \"${NEW_VERSION}\"/" sg_compute/pyproject.toml
          git add sg_compute/version sg_compute/pyproject.toml
          if git diff --cached --quiet; then
            echo "sg_compute already at ${NEW_VERSION} — no commit needed"
          else
            git commit -m "chore: sync sg_compute version to ${NEW_VERSION} [skip ci]"
            git push
          fi

  # ════════════════════════════════════════════════════════════════════════════
  # Job 5: Build Playwright Image — per-arch, on NATIVE runners (matrix)
  #   linux/amd64 builds on ubuntu-latest, linux/arm64 on ubuntu-24.04-arm.
  #   Each arch builds natively (no QEMU emulation — the slow path the single
  #   multi-arch job paid before) and pushes BY DIGEST only (no tag yet).
  #   Digests are handed to the merge job via artifacts.
  #
  #   Path-gated: only runs when sg_compute_specs/playwright/** or sg_compute/**
  #   changed (detect-changes), OR force_image_rebuild was set on dispatch.
  #   Runs after increment-tag so the merge job tags with the bumped version.
  # ════════════════════════════════════════════════════════════════════════════
  build-playwright-image:
    name: "Build Playwright Image (${{ matrix.platform }})"
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 25
    needs: [run-unit-tests, detect-changes, increment-tag]
    if: |
      always() &&
      needs.run-unit-tests.result == 'success' &&
      (needs.increment-tag.result == 'success' || needs.increment-tag.result == 'skipped') &&
      (needs.detect-changes.outputs.playwright-image-needed == 'true' || inputs.force_image_rebuild)
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform : linux/amd64
            runner   : ubuntu-latest
            arch     : amd64
          - platform : linux/arm64
            runner   : ubuntu-24.04-arm
            arch     : arm64
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.git_branch }}                                                 # Pick up the version-file bump pushed by increment-tag

      - name: Git Update Current Branch
        uses: owasp-sbot/OSBot-GitHub-Actions/.github/actions/git__update_branch@dev

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build + push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context     : .
          file        : sg_compute_specs/playwright/Dockerfile
          platforms   : ${{ matrix.platform }}
          cache-from  : type=gha,scope=${{ matrix.arch }}
          cache-to    : type=gha,scope=${{ matrix.arch }},mode=max
          outputs     : type=image,name=${{ env.REGISTRY_IMAGE }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name              : digest-${{ matrix.arch }}
          path              : /tmp/digests/*
          if-no-files-found : error
          retention-days    : 1

  # ════════════════════════════════════════════════════════════════════════════
  # Job 5b: Merge per-arch digests into the published manifest list
  #   Combines the amd64 + arm64 digests into a single multi-arch manifest and
  #   tags it. Pushes two tags:
  #     diniscruz/sg-playwright:<version>   — immutable, version-pinned
  #     diniscruz/sg-playwright:latest      — floating
  # ════════════════════════════════════════════════════════════════════════════
  push-playwright-manifest:
    name: "Push Playwright Image Manifest to Docker Hub"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build-playwright-image]
    if: ${{ !cancelled() && needs.build-playwright-image.result == 'success' }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.git_branch }}

      - name: Git Update Current Branch
        uses: owasp-sbot/OSBot-GitHub-Actions/.github/actions/git__update_branch@dev

      - name: Read image version
        id: version
        run: echo "version=$(cat sg_compute_specs/playwright/core/version)" >> $GITHUB_OUTPUT

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path    : /tmp/digests
          pattern : digest-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create + push manifest list
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            --tag ${{ env.REGISTRY_IMAGE }}:${{ steps.version.outputs.version }} \
            --tag ${{ env.REGISTRY_IMAGE }}:latest \
            $(printf '${{ env.REGISTRY_IMAGE }}@sha256:%s ' *)

      - name: Inspect published image
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY_IMAGE }}:${{ steps.version.outputs.version }}

  # ════════════════════════════════════════════════════════════════════════════
  # Job 6: Build + Push Host Control Image to ECR
  #   Separate concern — the host control plane still ships to ECR. Skipped
  #   when no sg_compute/** or docker/host-control/** files changed AND
  #   force_image_rebuild is false. Image name: sgraph_ai_service_playwright_host
  # ════════════════════════════════════════════════════════════════════════════
  build-and-push-host-image:
    name: "Build + Push Host Control Image to ECR"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [run-unit-tests, check-aws-credentials, detect-changes]
    if: |
      needs.check-aws-credentials.outputs.has-credentials == 'true' &&
      (needs.detect-changes.outputs.host-image-needed == 'true' || inputs.force_image_rebuild)
    steps:
      - uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id     : ${{ secrets.AWS_ACCESS_KEY_ID     }}
          aws-secret-access-key : ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region            : ${{ secrets.AWS_DEFAULT_REGION    }}

      - name: Create ECR repository (idempotent)
        run: |
          aws ecr create-repository \
            --repository-name "sgraph_ai_service_playwright_host" \
            --region "${{ secrets.AWS_DEFAULT_REGION }}" \
          || true

      - name: Authenticate Docker to ECR
        run: |
          aws ecr get-login-password --region "${{ secrets.AWS_DEFAULT_REGION }}" | \
            docker login \
              --username AWS \
              --password-stdin \
              "${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_DEFAULT_REGION }}.amazonaws.com"

      - name: Build Docker image
        run: |
          docker build \
            -f docker/host-control/Dockerfile \
            -t "${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_DEFAULT_REGION }}.amazonaws.com/sgraph_ai_service_playwright_host:latest" \
            .

      - name: Push to ECR
        run: |
          docker push \
            "${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_DEFAULT_REGION }}.amazonaws.com/sgraph_ai_service_playwright_host:latest"

      - name: Verify image in ECR
        run: |
          aws ecr describe-images \
            --repository-name "sgraph_ai_service_playwright_host" \
            --region "${{ secrets.AWS_DEFAULT_REGION }}" \
            --image-ids imageTag=latest \
            --query 'imageDetails[0].[imagePushedAt, imageSizeInBytes]' \
            --output table
