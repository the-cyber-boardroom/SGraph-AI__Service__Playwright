name: Bake AMI — Playwright EC2

# Triggered manually or automatically after a successful ECR image push.
# Each step is a separate GH Actions step so the progress is visible in the UI.
#
# Phase 1 — Base EC2:  fresh AL2023 install → health + smoke → clean → snapshot
# Phase 2 — AMI EC2:   launch from snapshot → health + smoke → tag healthy
#
# DEPLOY_NAME is set to ami-bake-{run_id} / ami-verify-{run_id} so that
# sg-play list clearly shows which instances belong to this pipeline run,
# and every command can target the exact instance without interactive prompts.
#
# The AMI ID is the only value carried between phases; it is written to
# $GITHUB_OUTPUT and referenced as steps.bake.outputs.ami_id throughout.

on:
  workflow_dispatch:
    inputs:
      playwright_image_uri:
        description: 'Playwright ECR image URI (leave blank for latest)'
        required: false
        type: string
      sidecar_image_uri:
        description: 'Sidecar ECR image URI (leave blank for latest)'
        required: false
        type: string

  workflow_run:
    workflows: ['CI Pipeline - DEV']
    types: [completed]
    # Only bake when the upstream CI succeeded
    branches: [dev]

env:
  PYTHON_VERSION: '3.12'

jobs:

  # ══════════════════════════════════════════════════════════════════════════
  # Phase 1 — Install from scratch, verify, clean, snapshot
  # ══════════════════════════════════════════════════════════════════════════
  bake:
    name: 'Bake AMI'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # Skip if triggered by workflow_run that did not succeed
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    outputs:
      ami_id: ${{ steps.bake.outputs.ami_id }}

    env:
      AWS_ACCESS_KEY_ID    : ${{ secrets.AWS_ACCESS_KEY_ID     }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION   : ${{ secrets.AWS_DEFAULT_REGION    }}
      AWS_ACCOUNT_ID       : ${{ secrets.AWS_ACCOUNT_ID        }}
      DEPLOY_NAME          : ami-bake-${{ github.run_id }}

    steps:

      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install sg-play
        run: pip install -r requirements.txt && pip install -e .

      # ── Base EC2 ──────────────────────────────────────────────────────────

      - name: 'Create base EC2 (${{ env.DEPLOY_NAME }})'
        run: |
          EXTRA=""
          [[ -n "${{ inputs.playwright_image_uri }}" ]] && EXTRA="$EXTRA --playwright-image-uri ${{ inputs.playwright_image_uri }}"
          [[ -n "${{ inputs.sidecar_image_uri    }}" ]] && EXTRA="$EXTRA --sidecar-image-uri    ${{ inputs.sidecar_image_uri    }}"
          sg-play create --name $DEPLOY_NAME $EXTRA

      - name: 'Wait — base EC2 service up'
        run: sg-play wait $DEPLOY_NAME --timeout 600

      - name: 'Health check — base EC2'
        run: sg-play health $DEPLOY_NAME

      # ── Prepare for snapshot ──────────────────────────────────────────────

      - name: 'Clean instance (remove logs, credentials, user-data)'
        run: sg-play clean $DEPLOY_NAME

      - name: 'Bake AMI'
        id: bake
        run: |
          AMI_ID=$(sg-play bake-ami $DEPLOY_NAME)
          echo "ami_id=$AMI_ID" >> "$GITHUB_OUTPUT"
          echo "AMI ID: $AMI_ID"

      - name: 'Delete base EC2 (cost saving while AMI is created)'
        if: always()
        run: sg-play delete $DEPLOY_NAME || true

      - name: 'Wait for AMI to become available'
        run: sg-play wait-ami ${{ steps.bake.outputs.ami_id }} --timeout 900

  # ══════════════════════════════════════════════════════════════════════════
  # Phase 2 — Verify the baked AMI from a clean launch
  # ══════════════════════════════════════════════════════════════════════════
  verify:
    name: 'Verify AMI'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: bake

    env:
      AWS_ACCESS_KEY_ID    : ${{ secrets.AWS_ACCESS_KEY_ID     }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION   : ${{ secrets.AWS_DEFAULT_REGION    }}
      AWS_ACCOUNT_ID       : ${{ secrets.AWS_ACCOUNT_ID        }}
      DEPLOY_NAME          : ami-verify-${{ github.run_id }}

    steps:

      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install sg-play
        run: pip install -r requirements.txt && pip install -e .

      - name: 'Launch from AMI (tagged untested) — ${{ env.DEPLOY_NAME }}'
        run: sg-play create --name $DEPLOY_NAME --from-ami ${{ needs.bake.outputs.ami_id }}

      - name: 'Wait — AMI-based EC2 service up'
        run: sg-play wait $DEPLOY_NAME --timeout 300

      - name: 'Health check — AMI instance'
        run: sg-play health $DEPLOY_NAME

      - name: 'Smoke test — AMI instance'
        run: sg-play smoke $DEPLOY_NAME

      - name: 'Tag AMI as healthy'
        run: sg-play tag-ami ${{ needs.bake.outputs.ami_id }} --status healthy

      - name: 'Delete AMI-based EC2'
        run: sg-play delete $DEPLOY_NAME

      - name: 'Tag AMI as unhealthy (on failure)'
        if: failure()
        run: |
          sg-play tag-ami ${{ needs.bake.outputs.ami_id }} --status unhealthy || true
          sg-play delete $DEPLOY_NAME || true
