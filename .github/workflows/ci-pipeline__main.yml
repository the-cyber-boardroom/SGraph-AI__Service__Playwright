name: CI Pipeline - MAIN
on:
  workflow_dispatch:
    inputs:
      force_image_rebuild:
        description: 'Force Docker image rebuild even when no image-relevant files changed'
        required: false
        type: boolean
        default: false
  push:
    branches:
      - main

jobs:
  deploy-main:
    uses: ./.github/workflows/ci-pipeline.yml
    with:
      git_branch          : 'main'
      release_type        : 'major'
      target_deploy       : 'main'
      should_increment_tag: true
      force_image_rebuild : ${{ inputs.force_image_rebuild || false }}
    secrets: inherit
