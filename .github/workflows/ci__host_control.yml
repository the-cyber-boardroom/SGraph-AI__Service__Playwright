# ═══════════════════════════════════════════════════════════════════════════════
# CI Pipeline — Host Control Plane
#
# Builds and pushes the sgraph_ai_service_playwright_host Docker image to ECR.
# Runs independently from the main Playwright pipeline — only fires when host
# package source, the Dockerfile, or this workflow file changes.
#
# Jobs:
#   1. run-unit-tests       — pytest against tests/unit/sgraph_ai_service_playwright__host/
#   2. check-aws-credentials — gates all AWS-touching jobs
#   3. detect-changes        — skips rebuild when no image-relevant file changed
#   4. build-and-push-image  — docker build (repo root as context) + ECR push
#
# Image name: sgraph_ai_service_playwright_host
# ECR URI: {account}.dkr.ecr.{region}.amazonaws.com/sgraph_ai_service_playwright_host:latest
# Runtime port: 9000 (host) → 8000 (container)
# ═══════════════════════════════════════════════════════════════════════════════

name: CI Pipeline - Host Control Plane

on:
  workflow_dispatch:
    inputs:
      force_image_rebuild:
        description: 'Force Docker image rebuild even when no image-relevant files changed'
        required: false
        type: boolean
        default: false
  push:
    branches:
      - dev
      - main
    paths:
      - 'sgraph_ai_service_playwright__host/**'
      - 'docker/host-control/**'
      - 'tests/unit/sgraph_ai_service_playwright__host/**'
      - '.github/workflows/ci__host_control.yml'
  pull_request:
    paths:
      - 'sgraph_ai_service_playwright__host/**'
      - 'docker/host-control/**'
      - 'tests/unit/sgraph_ai_service_playwright__host/**'
      - '.github/workflows/ci__host_control.yml'

env:
  IMAGE_NAME: 'sgraph_ai_service_playwright_host'

permissions:
  contents: read
  id-token: write

jobs:

  # ════════════════════════════════════════════════════════════════════════════
  # Job 1: Unit Tests (no Docker, no AWS)
  # ════════════════════════════════════════════════════════════════════════════
  run-unit-tests:
    name: "Run Unit Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-timeout

      - name: Run host package unit tests
        timeout-minutes: 5
        run: |
          python -m pytest tests/unit/sgraph_ai_service_playwright__host/ \
                           -v --timeout=30

  # ════════════════════════════════════════════════════════════════════════════
  # Job 2: Check AWS Credentials
  # ════════════════════════════════════════════════════════════════════════════
  check-aws-credentials:
    name: Check AWS Credentials
    runs-on: ubuntu-latest
    outputs:
      has-credentials: ${{ steps.check.outputs.has-credentials }}
    steps:
      - name: Check if AWS credentials are configured
        id: check
        run: |
          if [[ -n "${{ secrets.AWS_ACCESS_KEY_ID }}" ]] && \
             [[ -n "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ]] && \
             [[ -n "${{ secrets.AWS_DEFAULT_REGION }}" ]] && \
             [[ -n "${{ secrets.AWS_ACCOUNT_ID }}" ]]; then
            echo "has-credentials=true" >> $GITHUB_OUTPUT
          else
            echo "has-credentials=false" >> $GITHUB_OUTPUT
            echo "AWS credentials not configured — Docker push skipped"
          fi

  # ════════════════════════════════════════════════════════════════════════════
  # Job 3: Detect Image-Relevant Changes
  # ════════════════════════════════════════════════════════════════════════════
  detect-changes:
    name: Detect Image-Relevant Changes
    runs-on: ubuntu-latest
    outputs:
      image-rebuild-needed: ${{ steps.filter.outputs.image }}
    steps:
      - uses: actions/checkout@v5

      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            image:
              - 'sgraph_ai_service_playwright__host/**'
              - 'docker/host-control/Dockerfile'
              - 'docker/host-control/requirements.txt'

  # ════════════════════════════════════════════════════════════════════════════
  # Job 4: Build + Push Docker Image to ECR
  #   Build context is the repo root so the Dockerfile can COPY both
  #   docker/host-control/requirements.txt and sgraph_ai_service_playwright__host/.
  #   ECR repo is created idempotently before the push.
  # ════════════════════════════════════════════════════════════════════════════
  build-and-push-image:
    name: "Build + Push Host Control Image to ECR"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [run-unit-tests, check-aws-credentials, detect-changes]
    if: |
      needs.check-aws-credentials.outputs.has-credentials == 'true' &&
      (needs.detect-changes.outputs.image-rebuild-needed == 'true' || inputs.force_image_rebuild)
    steps:
      - uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id     : ${{ secrets.AWS_ACCESS_KEY_ID     }}
          aws-secret-access-key : ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region            : ${{ secrets.AWS_DEFAULT_REGION    }}

      - name: Create ECR repository (idempotent)
        run: |
          aws ecr create-repository \
            --repository-name "$IMAGE_NAME" \
            --region "${{ secrets.AWS_DEFAULT_REGION }}" \
          || true                                                                        # Ignore RepositoryAlreadyExistsException

      - name: Authenticate Docker to ECR
        run: |
          aws ecr get-login-password --region "${{ secrets.AWS_DEFAULT_REGION }}" | \
            docker login \
              --username AWS \
              --password-stdin \
              "${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_DEFAULT_REGION }}.amazonaws.com"

      - name: Build Docker image
        run: |
          docker build \
            -f docker/host-control/Dockerfile \
            -t "${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_DEFAULT_REGION }}.amazonaws.com/${IMAGE_NAME}:latest" \
            .

      - name: Push to ECR
        run: |
          docker push \
            "${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_DEFAULT_REGION }}.amazonaws.com/${IMAGE_NAME}:latest"

      - name: Verify image in ECR
        run: |
          aws ecr describe-images \
            --repository-name "$IMAGE_NAME" \
            --region "${{ secrets.AWS_DEFAULT_REGION }}" \
            --query 'imageDetails[?contains(imageTags, `latest`)].[imagePushedAt, imageSizeInBytes]' \
            --output table
